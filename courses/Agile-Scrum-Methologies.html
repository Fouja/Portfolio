<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agile Scrum Jira Workflow 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* LOGO */
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* IMAGE */
.nodeImg{
width:42px;
height:42px;
object-fit:contain;
border-radius:6px;
background:#000;
padding:3px;
}

/* FLOW */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:520px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div id="header">🧩 AGILE • SCRUM • JIRA • DEVOPS WORKFLOW (2026)</div>

<img id="logo" src="file:///home/dell/Desktop/Big_data/Portfolio/assets/foujalab.png">

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<div id="detailContent"></div>

<a id="learnBtn" target="_blank">Learn more</a><br>
<button id="close">Close</button>

</div>
</div>

<script>

/* =========================
   AGILE / SCRUM STACK
========================= */

const nodes = [

{
title:"Product Backlog 📋",
desc:"All tasks & requirements",
img:"https://cdn-icons-png.flaticon.com/512/906/906334.png",
detail:"Central list of features, bugs, and tasks prioritized by product owner.",
link:"https://www.atlassian.com/agile/product-management/backlog",
code:`User stories → Epics → Tasks`
},

{
title:"Sprint Planning 🏁",
desc:"Plan iteration work",
img:"https://cdn-icons-png.flaticon.com/512/1995/1995574.png",
detail:"Team selects backlog items for the sprint cycle.",
link:"https://www.atlassian.com/agile/scrum/sprint-planning",
code:`velocity → capacity → tasks`
},

{
title:"Jira Board 🟦",
desc:"Task tracking system",
img:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png",
detail:"Kanban/Scrum board for tracking progress.",
link:"https://www.atlassian.com/software/jira",
code:`To Do → In Progress → Done`
},

{
title:"User Stories 👤",
desc:"Feature requirements",
img:"https://cdn-icons-png.flaticon.com/512/1077/1077012.png",
detail:"Describes features from user perspective.",
link:"https://www.atlassian.com/agile/project-management/user-stories",
code:`As a user, I want...`
},

{
title:"Daily Standup ☕",
desc:"Team synchronization",
img:"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
detail:"Short daily meeting to update progress and blockers.",
link:"https://www.atlassian.com/agile/scrum/standups",
code:`What did I do? What next? Blockers?`
},

{
title:"Sprint Execution ⚡",
desc:"Development phase",
img:"https://cdn-icons-png.flaticon.com/512/1055/1055687.png",
detail:"Team implements tasks during sprint cycle.",
link:"https://scrumguides.org/",
code:`git commit → build → test`
},

{
title:"Testing QA 🧪",
desc:"Quality assurance",
img:"https://cdn-icons-png.flaticon.com/512/3003/3003984.png",
detail:"Ensures features meet requirements and are bug-free.",
link:"https://www.atlassian.com/continuous-delivery/software-testing",
code:`unit tests + integration tests`
},

{
title:"CI/CD 🚀",
desc:"Automation pipeline",
img:"https://cdn-icons-png.flaticon.com/512/5968/5968870.png",
detail:"Automates build, test and deployment.",
link:"https://www.redhat.com/en/topics/devops/what-is-ci-cd",
code:`git push → pipeline → deploy`
},

{
title:"Sprint Review 📊",
desc:"Demo completed work",
img:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png",
detail:"Team presents completed work to stakeholders.",
link:"https://www.atlassian.com/agile/scrum/sprint-reviews",
code:`demo → feedback → adjust`
},

{
title:"Retrospective 🔁",
desc:"Process improvement",
img:"https://cdn-icons-png.flaticon.com/512/860/860790.png",
detail:"Analyze what went well and what to improve.",
link:"https://www.atlassian.com/agile/scrum/retrospectives",
code:`start / stop / continue`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* RENDER */
function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="display:flex;gap:10px;align-items:center">
  <img class="nodeImg" src="${n.img}">
  <div>
    <div><b>${n.title}</b></div>
    <div style="font-size:12px;opacity:0.7">${n.desc}</div>
  </div>
</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* POSITION */
function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* FLOW */
function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;
const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* RUN */
function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

index++;

setTimeout(run,900);

}

/* MODAL */
function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
