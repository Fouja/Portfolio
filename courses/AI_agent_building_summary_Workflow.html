<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agents Ecosystem Flow 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* LOGO */
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* IMAGE */
.nodeImg{
width:42px;
height:42px;
object-fit:contain;
border-radius:6px;
background:#000;
padding:3px;
}

/* FLOW */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:480px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div id="header">🤖 AI AGENTS ECOSYSTEM (MCP + LANGCHAIN + LANGGRAPH + CREWAI + AUTOGEN)</div>

<img id="logo" src="../assets/foujalab.png">

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<div id="detailContent"></div>

<a id="learnBtn" target="_blank">Learn more</a><br>
<button id="close">Close</button>

</div>
</div>

<script>

/* =========================
   AI AGENT STACK 2026
========================= */

const nodes = [

{
title:"MCP 🧩",
desc:"Model Context Protocol",
img:"https://avatars.githubusercontent.com/u/18133?s=200&v=4",
detail:"Standard protocol to connect models with tools, memory and external systems.",
link:"https://modelcontextprotocol.io/",
code:`MCP connects LLM ↔ tools ↔ memory`
},

{
title:"LangChain 🧠",
desc:"LLM orchestration framework",
img:"https://avatars.githubusercontent.com/u/139895814?s=200&v=4",
detail:"Framework to build chains of LLM calls, tools, agents.",
link:"https://python.langchain.com/",
code:`from langchain.chains import LLMChain`
},

{
title:"LangGraph 🔁",
desc:"Stateful agent workflows",
img:"https://avatars.githubusercontent.com/u/139895814?s=200&v=4",
detail:"Graph-based agent system for loops, memory and multi-step reasoning.",
link:"https://langchain-ai.github.io/langgraph/",
code:`graph.add_node("agent")`
},

{
title:"CrewAI 👥",
desc:"Multi-agent collaboration",
img:"https://raw.githubusercontent.com/crewAIInc/crewAI/main/docs/logo.png",
detail:"Agents work as a team with roles and tasks.",
link:"https://www.crewai.com/",
code:`crew = Crew(agents=[researcher, writer])`
},

{
title:"AutoGen 🤖",
desc:"Microsoft multi-agent system",
img:"https://microsoft.github.io/autogen/assets/logo.png",
detail:"Agents communicate to solve tasks collaboratively.",
link:"https://microsoft.github.io/autogen/",
code:`assistant.chat(user)`
},

{
title:"Tool Calling 🔧",
desc:"External API execution",
img:"https://cdn-icons-png.flaticon.com/512/2092/2092663.png",
detail:"LLMs use tools like APIs, search, DBs.",
link:"https://platform.openai.com/docs/guides/function-calling",
code:`function_call: get_weather()`
},

{
title:"Memory 🧠",
desc:"Long-term context storage",
img:"https://cdn-icons-png.flaticon.com/512/4712/4712109.png",
detail:"Stores past interactions for reasoning continuity.",
link:"https://python.langchain.com/docs/modules/memory/",
code:`memory.save_context()`
},

{
title:"Agent Loop 🔄",
desc:"Reason → Act → Observe",
img:"https://cdn-icons-png.flaticon.com/512/1055/1055687.png",
detail:"Core cycle of AI agents executing tasks.",
link:"https://arxiv.org/abs/2308.08155",
code:`while not done: think() → act()`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* RENDER */
function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="display:flex;gap:10px;align-items:center">
  <img class="nodeImg" src="${n.img}">
  <div>
    <div><b>${n.title}</b></div>
    <div style="font-size:12px;opacity:0.7">${n.desc}</div>
  </div>
</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* POSITION */
function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* FLOW */
function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;
const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* RUN */
function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

index++;

setTimeout(run,900);

}

/* MODAL */
function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
