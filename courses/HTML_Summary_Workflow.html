<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Architecture Flow</title>

<style>

/* =========================
   BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* TITLE */
.title{
font-weight:bold;
}

.desc{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

/* FLOW LAYER */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

/* DOT */
.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

/* LINE */
.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:420px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

#modalBox h2{
color:#00f5ff;
margin-bottom:5px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

/* CODE BLOCK */
pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#progress{
height:5px;
background:#111;
width:100%;
}

#bar{
height:100%;
width:0%;
background:#00f5ff;
transition:0.3s;
}
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}
</style>
</head>

<body>
<img id="logo" src="../assets/foujalab.png" />
<div id="header">🌐 HTML ARCHITECTURE FLOW</div>

<div id="progress"><div id="bar"></div></div>

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalBox">
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>

    <div id="detailContent"></div>

    <a id="learnBtn" target="_blank">Learn more</a><br>
    <button id="close">Close</button>
  </div>
</div>

<script>

/* =========================
   DATA
========================= */

const nodes = [

{
title:"HTML Core 🌐",
desc:"Structure foundation of the web",
detail:"HTML defines the structure of web pages and builds the DOM tree.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML",
code:`<!DOCTYPE html>
<html>
<body>
<h1>Hello</h1>
</body>
</html>`
},

{
title:"DOCTYPE 📄",
desc:"HTML5 document declaration",
detail:"Ensures browser uses modern rendering mode.",
link:"https://developer.mozilla.org/en-US/docs/Glossary/Doctype",
code:`<!DOCTYPE html>`
},

{
title:"HEAD 🧠",
desc:"Metadata & configuration layer",
detail:"Contains meta, CSS links, scripts, SEO data.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/head",
code:`<head>
<meta charset="UTF-8">
<title>Page</title>
</head>`
},

{
title:"BODY 📦",
desc:"Visible UI content",
detail:"Everything rendered on screen lives here.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/body",
code:`<body>
<h1>Content</h1>
</body>`
},

{
title:"TEXT 📝",
desc:"Headings, paragraphs, inline text",
detail:"Used to structure readable content.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element",
code:`<h1>Title</h1>
<p>Paragraph</p>`
},

{
title:"MEDIA 🖼️",
desc:"Images, video, audio",
detail:"Embeds multimedia into web pages.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/img",
code:`<img src="img.jpg">
<video controls></video>`
},

{
title:"LINKS 🔗",
desc:"Navigation system",
detail:"Connect pages and resources.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/a",
code:`<a href="#">Click</a>`
},

{
title:"FORMS 📋",
desc:"User input system",
detail:"Collects data from users.",
link:"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/form",
code:`<form>
<input type="text">
</form>`
},

{
title:"SEMANTIC 🏗️",
desc:"Meaningful structure",
detail:"Improves SEO and accessibility.",
link:"https://developer.mozilla.org/en-US/docs/Glossary/Semantics",
code:`<header></header>
<article></article>`
},

{
title:"CSS 🎨",
desc:"Styling system",
detail:"Controls layout, colors, design.",
link:"https://developer.mozilla.org/en-US/docs/Web/CSS",
code:`body { color:white; }`
},

{
title:"JS ⚡",
desc:"Interactivity engine",
detail:"Adds logic and dynamic behavior.",
link:"https://developer.mozilla.org/en-US/docs/Web/JavaScript",
code:`document.querySelector("h1")
.innerText="Hi";`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const bar=document.getElementById("bar");

const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* =========================
   RENDER GRID
========================= */

function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="title">${n.title}</div>
<div class="desc">${n.desc}</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* =========================
   POSITION
========================= */

function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* =========================
   FLOW LINE + DOT
========================= */

function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;
const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* =========================
   FLOW RUN
========================= */

function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

bar.style.width=((index+1)/cards.length)*100+"%";

index++;

setTimeout(run,900);

}

/* =========================
   MODAL
========================= */

function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<div style="margin-top:10px">

<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>

</div>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
