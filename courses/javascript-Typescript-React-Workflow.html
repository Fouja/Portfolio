<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS + TS + React Ecosystem Flow</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* LOGO */
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* FLOW */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:450px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

#bar{
height:5px;
width:0%;
background:#00f5ff;
transition:0.3s;
}

</style>
</head>

<body>

<div id="header">⚛️ JS + TS + REACT ECOSYSTEM (2026 FRONTEND MAP)</div>

<img id="logo" src="../assets/foujalab.png">

<div id="bar"></div>

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<div id="detailContent"></div>

<a id="learnBtn" target="_blank">Learn more</a><br>
<button id="close">Close</button>

</div>
</div>

<script>

/* =========================
   FRONTEND ECOSYSTEM 2026
========================= */

const nodes = [

{
title:"JavaScript ⚡",
desc:"Core language of the web",
detail:"JavaScript powers interactivity, APIs, DOM manipulation and full-stack apps via Node.js.",
link:"https://developer.mozilla.org/en-US/docs/Web/JavaScript",
code:`document.querySelector("h1")
.innerText = "Hello JS";`
},

{
title:"ES Modules 📦",
desc:"Modern JS module system",
detail:"ESM allows modular imports/exports in modern JavaScript apps.",
link:"https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Modules",
code:`export const sum = (a,b)=>a+b;
import {sum} from './math.js';`
},

{
title:"TypeScript 🟦",
desc:"Typed JavaScript superset",
detail:"TypeScript adds static typing, interfaces, and safer development for large apps.",
link:"https://www.typescriptlang.org/docs/",
code:`type User = {
  name: string;
  age: number;
};`
},

{
title:"React ⚛️",
desc:"UI component library",
detail:"React builds UI using reusable components and virtual DOM diffing.",
link:"https://react.dev",
code:`function App(){
  return <h1>Hello React</h1>
}`
},

{
title:"React Hooks 🪝",
desc:"State & lifecycle management",
detail:"Hooks like useState and useEffect manage state and side effects.",
link:"https://react.dev/reference/react",
code:`const [count,setCount]=useState(0);`
},

{
title:"Next.js 🚀",
desc:"Full-stack React framework",
detail:"Next.js adds SSR, routing, API routes and performance optimization.",
link:"https://nextjs.org/docs",
code:`export default function Page(){
  return <h1>Next App</h1>
}`
},

{
title:"State Management 🧠",
desc:"Zustand / Redux / Jotai",
detail:"Modern state tools simplify global app state management.",
link:"https://zustand-demo.pmnd.rs/",
code:`const useStore = create(set => ({
  count: 0
}));`
},

{
title:"React Query 🔄",
desc:"Server state management",
detail:"Handles API caching, fetching and synchronization.",
link:"https://tanstack.com/query/latest",
code:`useQuery(['todos'], fetchTodos);`
},

{
title:"UI Libraries 🎨",
desc:"MUI / Chakra / Ant Design",
detail:"Prebuilt UI components for faster development.",
link:"https://mui.com/",
code:`<Button variant="contained">Click</Button>`
},

{
title:"Tailwind CSS ⚡",
desc:"Utility-first styling",
detail:"Used heavily with React for modern UI systems.",
link:"https://tailwindcss.com/docs",
code:`<div className="p-4 bg-blue-500">Box</div>`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const bar=document.getElementById("bar");

const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* RENDER */
function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div><b>${n.title}</b></div>
<div style="font-size:12px;opacity:0.7">${n.desc}</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* POS */
function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* FLOW */
function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;

const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* RUN */
function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

bar.style.width=((index+1)/cards.length)*100+"%";

index++;

setTimeout(run,900);

}

/* MODAL */
function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
