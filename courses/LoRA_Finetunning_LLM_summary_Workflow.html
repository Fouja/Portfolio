<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoRA + LLM Training Flow 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* LOGO */
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* IMAGE */
.nodeImg{
width:42px;
height:42px;
object-fit:contain;
border-radius:6px;
background:#000;
padding:3px;
}

/* FLOW */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:470px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div id="header">🧠 LORA + LLM TRAINING ECOSYSTEM FLOW (2026 AI STACK)</div>

<img id="logo" src="file:///home/dell/Desktop/Big_data/Portfolio/assets/foujalab.png">

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<div id="detailContent"></div>

<a id="learnBtn" target="_blank">Learn more</a><br>
<button id="close">Close</button>

</div>
</div>

<script>

/* =========================
   LLM + LORA ECOSYSTEM
========================= */

const nodes = [

{
title:"Transformer 🧠",
desc:"Foundation of modern LLMs",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Transformer_model_architecture.png",
detail:"Transformers use attention mechanisms to process sequences efficiently.",
link:"https://arxiv.org/abs/1706.03762",
code:`Attention(Q,K,V) = softmax(QK^T)V`
},

{
title:"LLM Base Model 🤖",
desc:"Large language model (GPT-like)",
img:"https://upload.wikimedia.org/wikipedia/commons/1/1f/AI-model.svg",
detail:"Pretrained on massive datasets to learn language patterns.",
link:"https://huggingface.co/models",
code:`model = AutoModel.from_pretrained("base-model")`
},

{
title:"Dataset 📊",
desc:"Training data source",
img:"https://cdn-icons-png.flaticon.com/512/2103/2103633.png",
detail:"High-quality datasets improve model performance.",
link:"https://huggingface.co/datasets",
code:`dataset = load_dataset("c4")`
},

{
title:"Fine-tuning 🔧",
desc:"Full model adaptation",
img:"https://cdn-icons-png.flaticon.com/512/8637/8637099.png",
detail:"Updates all model weights using task-specific data.",
link:"https://huggingface.co/docs/transformers/training",
code:`trainer.train()`
},

{
title:"LoRA ⚡",
desc:"Low-Rank Adaptation",
img:"https://huggingface.co/front/assets/huggingface_logo.svg",
detail:"Efficient fine-tuning using low-rank matrices instead of full weights.",
link:"https://arxiv.org/abs/2106.09685",
code:`lora_config = LoraConfig(r=8, alpha=16)`
},

{
title:"PEFT 🧩",
desc:"Parameter Efficient Fine-Tuning",
img:"https://huggingface.co/front/assets/huggingface_logo.svg",
detail:"Framework for LoRA, adapters, prefix tuning.",
link:"https://huggingface.co/docs/peft",
code:`from peft import get_peft_model`
},

{
title:"Quantization ⚙️",
desc:"Model compression",
img:"https://cdn-icons-png.flaticon.com/512/2092/2092663.png",
detail:"Reduces model size for faster inference.",
link:"https://huggingface.co/docs/optimum",
code:`model = quantize(model, bits=4)`
},

{
title:"Inference Engine 🚀",
desc:"Ollama / vLLM / TGI",
img:"https://cdn-icons-png.flaticon.com/512/4712/4712109.png",
detail:"Optimized runtime for serving LLMs.",
link:"https://ollama.com",
code:`ollama run llama3`
},

{
title:"Deployment 🌐",
desc:"API / App integration",
img:"https://cdn-icons-png.flaticon.com/512/1006/1006771.png",
detail:"Expose model via FastAPI or cloud services.",
link:"https://fastapi.tiangolo.com/",
code:`app = FastAPI()`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* RENDER */
function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="display:flex;gap:10px;align-items:center">
  <img class="nodeImg" src="${n.img}">
  <div>
    <div><b>${n.title}</b></div>
    <div style="font-size:12px;opacity:0.7">${n.desc}</div>
  </div>
</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* POS */
function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* FLOW */
function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;
const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* RUN */
function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

index++;

setTimeout(run,900);

}

/* MODAL */
function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
