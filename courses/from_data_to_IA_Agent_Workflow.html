<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Workflow Grid Flow</title>

<style>
body{
    margin:0;
    background:#050818;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

h1{
    text-align:center;
    margin:10px;
}

/* GRID */
#grid{
    position:relative;
    width:100vw;
    height:100vh;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-gap:20px;
    padding:80px;
    box-sizing:border-box;
}

/* NODE */
.node{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:0.3s;
    position:relative;
}

.node.active{
    border-color:#00f5ff;
    box-shadow:0 0 15px #00f5ff;
    transform:scale(1.05);
}

/* ICON */
.node img{
    width:28px;
    height:28px;
    margin-bottom:5px;
}

/* DOT (data flow) */
.dot{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#00f5ff;
    box-shadow:0 0 10px #00f5ff;
    opacity:0;
}

/* PANEL */
#panel{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    background:rgba(0,0,0,0.7);
    padding:12px;
    border-radius:10px;
    text-align:center;
    border:1px solid rgba(0,255,255,0.3);
}
</style>
</head>

<body>

<h1>🧠 AI WORKFLOW GRID</h1>

<div id="grid"></div>

<div id="panel">Clique pour lancer le workflow</div>

<script>

const steps = [
{name:"DATA", desc:"Datasets bruts", icon:"🧠"},
{name:"PANDAS", desc:"Cleaning / preprocessing", icon:"🐼"},
{name:"PYTORCH", desc:"Deep learning engine", icon:"🔥"},
{name:"TRANSFORMER", desc:"Attention architecture", icon:"🧬"},
{name:"LORA", desc:"Efficient fine-tuning", icon:"⚡"},
{name:"LLM", desc:"Model (Llama / Qwen)", icon:"🤖"},
{name:"INFERENCE", desc:"vLLM / Ollama", icon:"⚙️"},
{name:"LANGCHAIN", desc:"RAG + tools", icon:"🔗"},
{name:"CREWAI", desc:"Multi agents", icon:"👥"},
{name:"FASTAPI", desc:"Backend API", icon:"🚀"},
{name:"REACT", desc:"Frontend UI", icon:"⚛️"}
];

const grid = document.getElementById("grid");
const panel = document.getElementById("panel");

let nodes = [];

/* CREATE GRID NODES */
steps.forEach((s,i)=>{

    const div = document.createElement("div");
    div.className = "node";
    div.innerHTML = `
        <div style="font-size:24px">${s.icon}</div>
        <b>${s.name}</b>
        <div style="font-size:12px;opacity:0.7">${s.desc}</div>
    `;

    grid.appendChild(div);
    nodes.push(div);
});

/* GET POSITIONS */
function pos(el){
    const r = el.getBoundingClientRect();
    return {
        x:r.left + r.width/2,
        y:r.top + r.height/2
    };
}

/* DOT ANIMATION */
function moveDot(from,to){

    const dot = document.createElement("div");
    dot.className = "dot";
    document.body.appendChild(dot);

    let x = from.x;
    let y = from.y;

    dot.style.left = x + "px";
    dot.style.top = y + "px";
    dot.style.opacity = 1;

    const dx = (to.x - from.x)/40;
    const dy = (to.y - from.y)/40;

    let i = 0;

    const interval = setInterval(()=>{

        x += dx;
        y += dy;

        dot.style.left = x + "px";
        dot.style.top = y + "px";

        i++;

        if(i > 40){
            clearInterval(interval);
            dot.remove();
        }

    },20);
}

let current = 0;

/* FLOW */
function step(){

    if(current > 0){
        nodes[current-1].classList.remove("active");
    }

    if(current >= nodes.length){
        panel.innerHTML = "🎉 Workflow terminé";
        return;
    }

    nodes[current].classList.add("active");

    panel.innerHTML = `<b>${steps[current].name}</b><br>${steps[current].desc}`;

    if(current > 0){

        const a = pos(nodes[current-1]);
        const b = pos(nodes[current]);

        /* multiple dots = data flow effect */
        for(let i=0;i<5;i++){
            setTimeout(()=>moveDot(a,b), i*100);
        }
    }

    current++;
}

/* START */
document.body.onclick = () => {
    if(current === 0) step();
    else step();
};

</script>

</body>
</html>
