<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS + Tailwind + Figma Flow</title>

<style>

/* =========================
   BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */
#header{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* LOGO */
#logo{
position:fixed;
top:10px;
right:15px;
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 10px rgba(0,255,255,0.3);
z-index:999;
background:black;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 90px);
overflow:hidden;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#00f5ff;
}

.card.active{
box-shadow:0 0 15px #00f5ff;
border-color:#00f5ff;
}

/* FLOW */
#flowLayer{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
pointer-events:none;
}

.dot{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#00f5ff;
box-shadow:0 0 10px #00f5ff;
}

.line{
position:absolute;
height:2px;
background:rgba(0,255,255,0.2);
transform-origin:left center;
}

/* MODAL */
#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

#modalBox{
width:420px;
background:#0b1020;
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:20px;
}

#learnBtn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00f5ff;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

pre{
background:#000;
padding:10px;
border-radius:8px;
overflow:auto;
color:#00f5ff;
font-size:12px;
margin-top:10px;
}

#close{
margin-top:10px;
background:red;
color:white;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

#bar{
height:5px;
width:0%;
background:#00f5ff;
transition:0.3s;
}

</style>
</head>

<body>

<div id="header">🎨 CSS + TAILWIND CSS + FIGMA ARCHITECTURE FLOW</div>

<img id="logo" src="../assets/foujalab.png">

<div id="bar"></div>

<div id="grid"></div>
<div id="flowLayer"></div>

<!-- MODAL -->
<div id="modal">
<div id="modalBox">

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<div id="detailContent"></div>

<a id="learnBtn" target="_blank">Learn more</a><br>
<button id="close">Close</button>

</div>
</div>

<script>

/* =========================
   ARCHITECTURE DATA
========================= */

const nodes = [

{
title:"CSS Core 🎨",
desc:"Base styling system of the web",
detail:"CSS controls layout, colors, spacing, animations, and responsive design.",
link:"https://developer.mozilla.org/en-US/docs/Web/CSS",
code:`body {
  margin:0;
  background:#111;
  color:white;
}`
},

{
title:"Selectors 🎯",
desc:"Target HTML elements",
detail:"Selectors define which HTML elements CSS rules apply to.",
link:"https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_selectors",
code:`h1 {
  color:red;
}

.class {
  padding:10px;
}`
},

{
title:"Layout 📐",
desc:"Flexbox & Grid systems",
detail:"CSS layout systems control structure and positioning.",
link:"https://developer.mozilla.org/en-US/docs/Learn/CSS/CSS_layout",
code:`display:flex;
justify-content:center;
align-items:center;`
},

{
title:"Responsive 📱",
desc:"Adapt UI to all screens",
detail:"Media queries allow layouts to adapt to devices.",
link:"https://developer.mozilla.org/en-US/docs/Learn/CSS/CSS_layout/Media_queries",
code:`@media (max-width:600px){
  body{font-size:12px;}
}`
},

{
title:"Tailwind ⚡",
desc:"Utility-first CSS framework",
detail:"Tailwind uses utility classes instead of writing custom CSS.",
link:"https://tailwindcss.com/docs",
code:`<div class="flex items-center justify-center p-4">
  Hello Tailwind
</div>`
},

{
title:"Tailwind Layout 🧩",
desc:"Prebuilt spacing & grid utilities",
detail:"Tailwind provides fast layout construction using utility classes.",
link:"https://tailwindcss.com/docs/flexbox",
code:`<div class="grid grid-cols-3 gap-4">
  <div>Box</div>
</div>`
},

{
title:"Tailwind Styling 🎨",
desc:"Colors, shadows, typography",
detail:"Tailwind provides design tokens via class utilities.",
link:"https://tailwindcss.com/docs/customizing-colors",
code:`<div class="bg-blue-500 text-white p-4 shadow-lg">
  Styled box
</div>`
},

{
title:"Figma UI Design 🧠",
desc:"Design system & prototyping",
detail:"Figma is used to design UI layouts before coding.",
link:"https://www.figma.com/resources/learn-design/",
code:`Frame → AutoLayout → Components → Variants`
},

{
title:"Design System 🧱",
desc:"Reusable UI components",
detail:"Design systems ensure consistency across apps.",
link:"https://www.figma.com/design-systems/",
code:`Button / Card / Navbar / Input`
},

{
title:"Dev Handoff 🚀",
desc:"Design to code workflow",
detail:"Figma designs are converted into CSS or Tailwind implementations.",
link:"https://www.figma.com/developers/api",
code:`Figma → Inspect → CSS → Tailwind`
}

];

const grid=document.getElementById("grid");
const flowLayer=document.getElementById("flowLayer");
const bar=document.getElementById("bar");

const modal=document.getElementById("modal");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");
const learnBtn=document.getElementById("learnBtn");

let cards=[];
let index=0;

/* RENDER */
function render(){

grid.innerHTML="";
cards=[];

nodes.forEach((n,i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div><b>${n.title}</b></div>
<div style="font-size:12px;opacity:0.7">${n.desc}</div>
`;

div.onclick=()=>openModal(i);

grid.appendChild(div);
cards.push(div);

});

}

render();

/* POSITION */
function pos(el){
const r=el.getBoundingClientRect();
return {x:r.left+r.width/2,y:r.top+r.height/2};
}

/* FLOW */
function drawFlow(a,b){

const p1=pos(cards[a]);
const p2=pos(cards[b]);

const dx=p2.x-p1.x;
const dy=p2.y-p1.y;

const dist=Math.sqrt(dx*dx+dy*dy);

const line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=p1.x+"px";
line.style.top=p1.y+"px";
line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

flowLayer.appendChild(line);

const dot=document.createElement("div");
dot.className="dot";
flowLayer.appendChild(dot);

let t=0;

const anim=setInterval(()=>{

dot.style.left=p1.x+dx*t+"px";
dot.style.top=p1.y+dy*t+"px";

t+=0.02;

if(t>=1){
clearInterval(anim);
dot.remove();
setTimeout(()=>line.remove(),300);
}

},16);

}

/* FLOW RUN */
function run(){

if(index>0){
cards[index-1].classList.remove("active");
drawFlow(index-1,index);
}

if(index>=cards.length)return;

cards[index].classList.add("active");

bar.style.width=((index+1)/cards.length)*100+"%";

index++;

setTimeout(run,900);

}

/* MODAL */
function openModal(i){

const n=nodes[i];

modal.style.display="flex";

mTitle.innerText=n.title;
mDesc.innerText=n.desc;
learnBtn.href=n.link;

document.getElementById("detailContent").innerHTML=`
<h3>Explanation</h3>
<p>${n.detail}</p>

<h3 style="margin-top:10px">Code Example</h3>
<pre>${n.code}</pre>
`;

}

/* CLOSE */
document.getElementById("close").onclick=()=>{
modal.style.display="none";
};

/* START */
document.body.onclick=()=>{
if(index===0) run();
};

</script>

</body>
</html>
