<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0066CC" stroke-width="2"/>
  
  <!-- Brain icon on right -->
  <g transform="translate(110, 80)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="none" stroke="#0066CC" stroke-width="1.5"/>
    <path d="M -8 -8 Q -10 -12 -12 -10" fill="none" stroke="#0066CC" stroke-width="1"/>
    <path d="M -4 -12 Q -5 -14 -3 -12" fill="none" stroke="#0066CC" stroke-width="1"/>
    <path d="M 0 -12 Q 0 -14 2 -12" fill="none" stroke="#0066CC" stroke-width="1"/>
    <path d="M 4 -12 Q 5 -14 7 -12" fill="none" stroke="#0066CC" stroke-width="1"/>
    <path d="M 8 -8 Q 10 -12 12 -10" fill="none" stroke="#0066CC" stroke-width="1"/>
    <circle cx="0" cy="4" r="2" fill="#0066CC"/>
  </g>
  
  <!-- Code brackets on left -->
  <g transform="translate(70, 100)">
    <text x="0" y="0" font-size="24" font-weight="bold" fill="#0066CC" font-family="monospace">&lt;/&gt;</text>
  </g>
  
  <!-- Text: FoujeLab -->
  <text x="100" y="155" font-size="18" font-weight="bold" fill="#002366" text-anchor="middle" font-family="Arial, sans-serif">FoujeLab</text>
  
  <!-- Tagline -->
  <text x="100" y="170" font-size="8" fill="#0066CC" text-anchor="middle" font-family="Arial, sans-serif">CODE. INTELLIGENCE. INNOVATION.</text>
</svg>